<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Linkora – Complete Your Upgrade</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #0a66c2;
      --accent-light: #e8f0fb;
      --ink: #0f0f14;
      --muted: #8a8a95;
      --border: #e8e8ed;
      --bg: #f7f8fa;
      --success: #16a34a;
      --purple: #7c3aed;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 32px rgba(0,0,0,0.07);
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: var(--ink);
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }

    /* Plan badge */
    .plan-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: var(--accent-light);
      color: var(--accent);
      margin-bottom: 8px;
    }
    .plan-badge.max { background: #f0ebff; color: var(--purple); }

    .plan-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 26px;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .plan-price {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* Features */
    .features {
      list-style: none;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .features li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--ink);
    }
    .features li::before {
      content: '✓';
      color: var(--success);
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }

    /* Pay button */
    .btn-pay {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 10px rgba(10,102,194,0.3);
      margin-bottom: 12px;
    }
    .btn-pay:hover { background: #0856a8; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(10,102,194,0.4); }
    .btn-pay:active { transform: translateY(0); }
    .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-pay.max { background: var(--purple); box-shadow: 0 2px 10px rgba(124,58,237,0.3); }
    .btn-pay.max:hover { background: #6d28d9; box-shadow: 0 4px 16px rgba(124,58,237,0.4); }

    .secure-note {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
    }
    .secure-note svg {
      vertical-align: middle;
      margin-right: 4px;
    }

    /* Success state */
    .success-state {
      display: none;
      text-align: center;
      padding: 20px 0;
    }
    .success-icon {
      width: 56px; height: 56px;
      background: #dcfce7;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 26px;
    }
    .success-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .success-msg {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 20px;
    }
    .btn-close {
      padding: 12px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }

    /* Error */
    .error-msg {
      background: #fff5f5;
      border: 1.5px solid #fecaca;
      border-radius: 10px;
      padding: 11px 13px;
      font-size: 13px;
      color: #e84040;
      margin-top: 12px;
      display: none;
    }
    .error-msg.show { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Linked<span>AI</span></div>

    <!-- Main payment state -->
    <div id="mainState">
      <div class="plan-badge" id="planBadge">Pro</div>
      <div class="plan-name" id="planName">Pro Plan</div>
      <div class="plan-price" id="planPrice">$9 / month</div>
      <ul class="features" id="featuresList"></ul>
      <button class="btn-pay" id="payBtn">Pay Now</button>
      <div class="secure-note">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Secured by Razorpay
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- Success state -->
    <div class="success-state" id="successState">
      <div class="success-icon">✓</div>
      <div class="success-title">You're all set!</div>
      <div class="success-msg">Your plan has been activated. Close this tab and reopen Linkora to start generating.</div>
      <button class="btn-close" onclick="window.close()">Close Tab</button>
    </div>
  </div>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    const PLAN_FEATURES = {
      pro: ['Everything in the Free plan', '250 generations per month', 'Priority support'],
      max: ['Everything in the Pro plan', 'Unlimited generations', 'Priority support']
    };

    const params = new URLSearchParams(location.search);
    const subscriptionId = params.get('sub');
    const keyId = params.get('key');
    const plan = params.get('plan') || 'pro';
    const userName = decodeURIComponent(params.get('name') || '');
    const userEmail = decodeURIComponent(params.get('email') || '');
    const token = params.get('token');
    const backendUrl = location.origin;

    // Populate plan info
    const isMax = plan === 'max';
    document.getElementById('planBadge').textContent = isMax ? 'Max' : 'Pro';
    document.getElementById('planBadge').classList.toggle('max', isMax);
    document.getElementById('planName').textContent = isMax ? 'Max Plan' : 'Pro Plan';
    document.getElementById('planPrice').textContent = isMax ? '$20 / month' : '$9 / month';
    document.getElementById('payBtn').classList.toggle('max', isMax);

    const features = PLAN_FEATURES[plan] || PLAN_FEATURES.pro;
    const ul = document.getElementById('featuresList');
    features.forEach(f => {
      const li = document.createElement('li');
      li.textContent = f;
      ul.appendChild(li);
    });

    // Validate required params
    if (!subscriptionId || !keyId || !token) {
      showError('Invalid payment link. Please try upgrading again from the extension.');
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
      const btn = document.getElementById('payBtn');
      btn.disabled = true;
      btn.textContent = 'Unavailable';
    }

    document.getElementById('payBtn').addEventListener('click', function () {
      if (!subscriptionId || !keyId) return;
      const btn = this;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Opening checkout…';

      const rzp = new Razorpay({
        key: keyId,
        subscription_id: subscriptionId,
        name: 'LinkedAI',
        description: isMax ? 'Max Plan · $20/month' : 'Pro Plan · $9/month',
        image: '',
        prefill: { name: userName, email: userEmail },
        theme: { color: isMax ? '#7c3aed' : '#0a66c2' },
        handler: async function (response) {
          btn.innerHTML = '<span class="spinner"></span>Activating…';
          try {
            const verifyRes = await fetch(`${backendUrl}/api/billing/verify`, {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                razorpay_payment_id: response.razorpay_payment_id,
                razorpay_subscription_id: response.razorpay_subscription_id,
                razorpay_signature: response.razorpay_signature
              })
            });

            if (!verifyRes.ok) {
              const err = await verifyRes.json();
              throw new Error(err.error || 'Verification failed');
            }

            // Show success
            document.getElementById('mainState').style.display = 'none';
            document.getElementById('successState').style.display = 'block';

          } catch (err) {
            btn.disabled = false;
            btn.textContent = 'Pay Now';
            showError('Payment verification failed: ' + err.message);
          }
        },
        modal: {
          ondismiss: function () {
            btn.disabled = false;
            btn.textContent = 'Pay Now';
          }
        }
      });

      rzp.open();
    });
  </script>
</body>
</html>
